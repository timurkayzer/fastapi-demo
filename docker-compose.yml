services:

  service:
    build: .
    restart: always
    ports:
      - 8000:8000
    depends_on:
      - db
    env_file: .env

  db:
    image: postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5432:5432
